name: Unit tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements_dev.txt"

      - name: Install PyTorch (CPU)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            pip install torch
          else
            pip install torch --index-url https://download.pytorch.org/whl/cpu
          fi

      - name: Install dependencies
        run: pip install pytest biopython pandas transformers==4.36.0 omegaconf==2.3.0 pytorch-crf==0.7.2 tqdm numpy

      - name: Run tests
        run: pytest tests/ -v
